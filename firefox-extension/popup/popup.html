<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup">
  <div class="container">
    <h1>PlaylistReader</h1>
    <p class="subtitle">Exporte playlists do Spotify para YAML</p>

    <div id="status" class="status status-waiting">
      <span id="status-icon">&#9203;</span>
      <span id="status-text">Verificando Spotify...</span>
    </div>

    <div id="playlist-info" class="playlist-info" style="display: none;">
      <span>Playlist:</span>
      <strong id="playlist-name">-</strong>
    </div>

    <button id="export-btn" disabled>
      <span>&#128230;</span>
      <span>Exportar Playlist</span>
    </button>

    <div id="progress" class="progress" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <p class="hint">Acesse <code>open.spotify.com</code> e abra uma playlist para comecar.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
